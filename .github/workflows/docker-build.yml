name: B-Bot CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker Image
        run: docker build -t b-botgotchi:latest .
      - name: Test Python Syntax
        run: python3 -m py_compile main.py utils.py
